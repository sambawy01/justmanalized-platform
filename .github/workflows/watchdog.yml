# Site watchdog — every 30 minutes, FROM GitHub's infrastructure.
#
# Deliberately does NOT route alerts through the app: the whole point is to
# detect the app being down, so the WORKFLOW ITSELF probes the public
# endpoints and sends the alerts directly (Telegram Bot API + Resend API).
#
# Checks (each gets 2 attempts 15s apart to absorb transient network blips):
#   a) https://justmanalized.com                     → 200 + "Just Manalized"
#   b) https://justmanalized.com/shop.html           → 200
#   c) https://shop.justmanalized.com/api/products    → 200 + JSON with .products array
#
# NOTE (Track B / rebrand): the domains above are PLACEHOLDERS — set the real
# ones once the brand domain is confirmed.
#
# DEBOUNCE POLICY (deliberate): no debounce — every failing 30-min run
# alerts again. During a real outage a reminder every 30 minutes is
# acceptable (useful, even) noise, and statelessness means no cache/artifact
# marker that could itself fail and suppress a real alert.
#
# Secrets:
#   RESEND_API_KEY      — required for email alerts.
#   WATCHDOG_EMAILS     — comma-separated alert recipients (the same owner
#                         addresses as the app's NOTIFY_EMAIL). Kept out of
#                         this PUBLIC file as a secret; email alerts are
#                         skipped gracefully if unset. Set with:
#                         gh secret set WATCHDOG_EMAILS --body "a@x.com,b@y.com"
#   TELEGRAM_BOT_TOKEN  — optional; Telegram alert skipped gracefully if unset.
#   OWNER_CHAT_ID       — optional; cannot exist until Victoria binds her
#                         chat to the bot. Set later with:
#                         gh secret set OWNER_CHAT_ID --body "<chat id>"
#
# MINUTES MATH: every-30-min × ~1 min/run ≈ 1,440 min/month. Free on this
# PUBLIC repo (public repos get unlimited Actions minutes). If the repo ever
# goes PRIVATE, this alone consumes ~72% of the 2,000-minute free tier —
# stretch the schedule (e.g. hourly) before flipping visibility.
#
# NOTE: GitHub auto-disables scheduled workflows after 60 days without
# repository activity — keepalive.yml re-enables them weekly (see there).
name: watchdog

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Probe site endpoints
        id: checks
        run: |
          set -uo pipefail
          FAILURES=""

          probe() { # probe <label> <url> <mode>  (mode: status|string|json)
            local label="$1" url="$2" mode="$3" attempt code ok=0
            for attempt in 1 2; do
              code=$(curl -sS -m 30 -o /tmp/body -w '%{http_code}' "$url" 2>/tmp/curlerr) || code="000"
              if [ "$code" = "200" ]; then
                case "$mode" in
                  status) ok=1 ;;
                  string) grep -q "Just Manalized" /tmp/body && ok=1 ;;
                  json)   jq -e '.products | type == "array"' /tmp/body >/dev/null 2>&1 && ok=1 ;;
                esac
              fi
              [ "$ok" = "1" ] && break
              echo "Attempt ${attempt} failed for ${label}: HTTP ${code} $(cat /tmp/curlerr 2>/dev/null | head -c 200)"
              [ "$attempt" = "1" ] && sleep 15
            done
            if [ "$ok" = "1" ]; then
              echo "OK: ${label}"
            else
              FAILURES="${FAILURES}- ${label}: HTTP ${code}"$'\n'
            fi
          }

          probe "homepage (justmanalized.com)" "https://justmanalized.com" string
          probe "shop page (/shop.html)" "https://justmanalized.com/shop.html" status
          probe "products API (/api/products)" "https://shop.justmanalized.com/api/products" json

          {
            echo "failures<<WATCHDOG_EOF"
            printf '%s' "$FAILURES"
            echo "WATCHDOG_EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$FAILURES" ]; then
            echo "FAILING CHECKS:"
            printf '%s' "$FAILURES"
            exit 1
          fi

      - name: Telegram alert
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OWNER_CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          FAILURES: ${{ steps.checks.outputs.failures }}
        run: |
          set -uo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${OWNER_CHAT_ID}" ]; then
            echo "Telegram alert skipped (TELEGRAM_BOT_TOKEN / OWNER_CHAT_ID not set)"
            exit 0
          fi
          TEXT="SITE WATCHDOG ALERT
          The following checks are failing:
          ${FAILURES:-"(checks step crashed before reporting)"}
          Probed from GitHub Actions (runs every 30 min; alerts repeat while the outage lasts)."
          jq -n --arg chat "$OWNER_CHAT_ID" --arg text "$TEXT" \
            '{chat_id: $chat, text: $text}' \
          | curl -sS -m 30 -X POST \
              -H 'Content-Type: application/json' \
              -d @- \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          || echo "Telegram alert send failed"

      - name: Email alert (Resend)
        if: ${{ failure() }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FAILURES: ${{ steps.checks.outputs.failures }}
          # Comma-separated owner addresses — a repo secret, never hardcoded
          # in this public file (see the header for the gh secret command).
          WATCHDOG_EMAILS: ${{ secrets.WATCHDOG_EMAILS }}
        run: |
          set -uo pipefail
          if [ -z "${RESEND_API_KEY}" ]; then
            echo "Email alert skipped (RESEND_API_KEY not set)"
            exit 0
          fi
          if [ -z "${WATCHDOG_EMAILS}" ]; then
            echo "Email alert skipped (WATCHDOG_EMAILS not set)"
            exit 0
          fi
          BODY="The site watchdog (GitHub Actions, every 30 min) found failing checks:

          ${FAILURES:-"(checks step crashed before reporting)"}

          Checks: homepage, shop page (/shop.html), products API.
          Alerts repeat every 30 minutes while the outage lasts."
          for TO in $(printf '%s' "${WATCHDOG_EMAILS}" | tr ',' ' '); do
            jq -n \
              --arg from "Just Manalized <orders@justmanalized.com>" \
              --arg to "$TO" \
              --arg subject "SITE DOWN — watchdog alert" \
              --arg text "$BODY" \
              '{from: $from, to: [$to], subject: $subject, text: $text}' \
            | curl -sS -m 30 -X POST \
                -H "Authorization: Bearer ${RESEND_API_KEY}" \
                -H 'Content-Type: application/json' \
                -d @- \
                "https://api.resend.com/emails" \
            || echo "Email alert send failed for one recipient"
            echo
          done
