<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Just Manalized — concho medallion">
  <defs>
    <radialGradient id="jmBrass" cx="38%" cy="32%" r="78%">
      <stop offset="0" stop-color="#EBD0A2"/>
      <stop offset="0.45" stop-color="#C9A268"/>
      <stop offset="1" stop-color="#8A6736"/>
    </radialGradient>
    <radialGradient id="jmBrassStud" cx="40%" cy="35%" r="75%">
      <stop offset="0" stop-color="#E7C99A"/>
      <stop offset="1" stop-color="#7A5A30"/>
    </radialGradient>
    <radialGradient id="jmTurq" cx="38%" cy="34%" r="72%">
      <stop offset="0" stop-color="#86D6CF"/>
      <stop offset="0.5" stop-color="#2F9C95"/>
      <stop offset="1" stop-color="#1C6862"/>
    </radialGradient>
  </defs>

  <!-- beaded outer rim -->
  <circle cx="50" cy="50" r="44.5" fill="none" stroke="#8A6736" stroke-width="2.6"
          stroke-linecap="round" stroke-dasharray="0 6.1"/>

  <!-- main brass disc -->
  <circle cx="50" cy="50" r="41.5" fill="url(#jmBrass)" stroke="#6E4F29" stroke-width="1"/>

  <!-- engraved concentric rings -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#6E4F29" stroke-width="1" opacity="0.5"/>
  <circle cx="50" cy="50" r="32.5" fill="none" stroke="#F2DEBA" stroke-width="0.8" opacity="0.5"/>

  <!-- four cardinal studs -->
  <g stroke="#6E4F29" stroke-width="0.6">
    <circle cx="50" cy="15.6" r="2.7" fill="url(#jmBrassStud)"/>
    <circle cx="84.4" cy="50" r="2.7" fill="url(#jmBrassStud)"/>
    <circle cx="50" cy="84.4" r="2.7" fill="url(#jmBrassStud)"/>
    <circle cx="15.6" cy="50" r="2.7" fill="url(#jmBrassStud)"/>
  </g>

  <!-- turquoise cabochon in a brass bezel -->
  <circle cx="50" cy="50" r="18" fill="url(#jmBrass)" stroke="#6E4F29" stroke-width="1"/>
  <circle cx="50" cy="50" r="14.5" fill="url(#jmTurq)" stroke="#1C6862" stroke-width="0.8"/>
  <!-- cabochon specular highlight -->
  <ellipse cx="44.5" cy="44" rx="4.8" ry="3.2" fill="#FFFFFF" opacity="0.35"/>
</svg>
